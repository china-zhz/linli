<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>选择社区 - 邻里社区</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<style>
        body { background-color: #F8F8F8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .wechat-container { width: 375px; height: 812px; margin: 20px auto; border: 8px solid #333; border-radius: 40px; position: relative; overflow: hidden; background: #F8F8F8; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .status-bar { height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; font-size: 14px; font-weight: 600; }
        .capsule { position: absolute; top: 48px; right: 10px; width: 87px; height: 32px; background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; display: flex; align-items: center; justify-content: space-evenly; z-index: 50; }
    </style>
</head>
<body>
<div class="wechat-container">
<!-- 状态栏 -->
<div class="status-bar">
<span>9:41</span>
<div class="flex gap-1">
<span class="iconify" data-icon="ion:wifi"></span>
<span class="iconify" data-icon="ion:battery-full"></span>
</div>
</div>
<!-- 胶囊按钮 -->
<div class="capsule text-white">
<span class="iconify" data-icon="mi:options-vertical"></span>
<div class="w-[1px] h-4 bg-white/30"></div>
<span class="iconify" data-icon="ri:close-circle-fill"></span>
</div>
<!-- 内容区域 -->
<div class="p-4 pt-8">
<h1 class="text-2xl font-bold text-gray-800 mb-6">欢迎来到邻里社区</h1>
<!-- 搜索框 -->
<div class="relative mb-6">
<span class="iconify absolute left-3 top-3 text-gray-400" data-icon="ri:search-line"></span>
<input class="w-full pl-10 pr-4 py-2.5 bg-white rounded-xl border-none shadow-sm focus:ring-2 focus:ring-[#07C160] transition-all" placeholder="搜索您所在的小区" type="text"/>
</div>
<!-- 当前定位 -->
<div class="bg-white p-4 rounded-2xl mb-6 shadow-sm">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2 text-gray-500 text-sm">
<span class="iconify text-[#07C160]" data-icon="ri:map-pin-2-fill"></span>
                        当前定位
                    </div>
<span class="text-[#07C160] text-sm">重新定位</span>
</div>
<div class="mt-2 text-lg font-bold text-gray-800">上海市 · 浦东新区 · 碧桂园清华园</div>
</div>
<!-- 推荐小区列表 -->
<div class="space-y-4">
<h2 class="text-sm font-semibold text-gray-400 ml-1">附近的社区</h2>
<a class="block bg-white p-4 rounded-2xl shadow-sm hover:ring-2 hover:ring-[#07C160] transition-all" href="index.html">
<div class="flex justify-between items-center">
<div>
<div class="font-bold text-gray-800">碧桂园清华园</div>
<div class="text-xs text-gray-500 mt-1">距离您 230m | 浦东新区张江街12号</div>
</div>
<span class="iconify text-gray-300" data-icon="ri:arrow-right-s-line"></span>
</div>
</a>
<a class="block bg-white p-4 rounded-2xl shadow-sm hover:ring-2 hover:ring-[#07C160] transition-all" href="index.html">
<div class="flex justify-between items-center">
<div>
<div class="font-bold text-gray-800">万科锦绣家园</div>
<div class="text-xs text-gray-500 mt-1">距离您 850m | 浦东新区绣川路88号</div>
</div>
<span class="iconify text-gray-300" data-icon="ri:arrow-right-s-line"></span>
</div>
</a>
<a class="block bg-white p-4 rounded-2xl shadow-sm hover:ring-2 hover:ring-[#07C160] transition-all" href="index.html">
<div class="flex justify-between items-center">
<div>
<div class="font-bold text-gray-800">融创中心壹号</div>
<div class="text-xs text-gray-500 mt-1">距离您 1.2km | 浦东新区张衡路500号</div>
</div>
<span class="iconify text-gray-300" data-icon="ri:arrow-right-s-line"></span>
</div>
</a>
<a class="block bg-white p-4 rounded-2xl shadow-sm hover:ring-2 hover:ring-[#07C160] transition-all" href="index.html">
<div class="flex justify-between items-center">
<div>
<div class="font-bold text-gray-800">静安府东区</div>
<div class="text-xs text-gray-500 mt-1">距离您 2.5km | 静安区汶水路</div>
</div>
<span class="iconify text-gray-300" data-icon="ri:arrow-right-s-line"></span>
</div>
</a>
</div>
</div>
</div>
</body>
</html>
